<svg width="500" height="140" viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hadiaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#556270"></stop>
      <stop offset="100%" stop-color="#4ECDC4"></stop>
    </linearGradient>
  </defs>

  <!-- Chef Hat -->
  <g transform="translate(20,20)">
    <path d="M50 30
             C50 10, 80 10, 80 30
             C90 15, 115 20, 115 45
             C115 65, 95 70, 85 65
             L85 90
             L35 90
             L35 65
             C20 70, 0 60, 0 40
             C0 15, 30 10, 50 30Z" fill="url(#hadiaGradient)"></path>
    <rect x="35" y="85" width="50" height="10" rx="3" fill="url(#hadiaGradient)"></rect>
  </g>

  <!-- Restaurant Name -->
  <text x="150" y="65" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="url(#hadiaGradient)">
    Hadia's
  </text>

  <text x="150" y="105" font-family="Arial, sans-serif" font-size="26" letter-spacing="4" fill="#556270">
    RESTAURANT
  </text>

  <!-- Decorative Line -->
  <line x1="150" y1="75" x2="430" y2="75" stroke="#4ECDC4" stroke-width="2"></line>
</svg>